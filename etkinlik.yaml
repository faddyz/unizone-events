  YetkilendirmeHatasi:
    description: |
      Yetkilendirme hatası meydana geldiğinde bu hata ile
      karşılaşırsınız. Yetkilendirme için X-Etkinlik-Token
      bilgisi istek (request) başlığında (header) gönderilmelidir.
    schema:
      $ref: '#/definitions/YetkilendirmeHatasi'
    examples:
      application/json:
        success: false
        message: X-Etkinlik-Token bilgisi geçerli değil. İstek yaparken header içinde doğru olarak gönderdiğinizden emin olunuz.
  GenelHata:
    description: |
      Genel bir hata meydana geldiğinde bu sonuç ile karşılaşırsınız.
    schema:
      $ref: '#/definitions/GenelHata'
    examples:
      application/json:
        success: false
        message: Id bilgisi boş geçilemez.
  MukerrerKayitHatasi:
    description: |
      Genelde bir kayıt sorgulanırken sorgulanan kayda ait bilgi
      sistem tarafında mükerrer olarak işaretlenmiş ise bu cevap
      (response) meydana gelir. Örneğin bir etkinlik sisteme
      birden fazla eklenebilmektedir. Daha sonra farkedildiğinde
      bir tanesi asıl kayıt olacak şekilde diğerleri mükerrer
      olarak işaretlenir. İşaretlenen mükerrer kayıtlar da asıl
      kayda yönlendirilir. 301 kodu ile karşılaştığınızda
      new_id bilgisini kullanarak aynı sorgu servisi üzerinden
      200 kodu ile doğru cevap (response) alabilirsiniz.
    schema:
      $ref: '#/definitions/GenelHata'
    examples:
      application/json:
        success: false
        message: 123 numaralı etkinlik mükerrer olarak işaretlenmiş.
        new_id: 456
        new_name: Deneme Etkinlik Adı
        new_slug: deneme-etkinlik-adi

  BulunamadiHatasi:
    description: |
      Bir talepte sonuç elde edilmezse bulunamadı hatası meydana gelir.
      Bu hata boş bir sonuç anlamında değildir. Örneğin bir 5 numaralı
      etkinlik detay sorgulandığında ve bu hata alındığında 5 numaralı
      etkinliğin sistemde yer almadığı anlamındadır.
    schema:
      $ref: '#/definitions/BulunamadiHatasi'
    examples:
      application/json:
        success: false
        message: 123 numaralı etkinlik bulunamadı.

  SilindiHatasi:
    description: |
      Bir kayıt sistemden silinmiş olabilir. Bu durumda 410 kodu
      dönecektir. Bu gibi durumlarda artık kayıt içeriğinin geçersiz
      olduğu anlaşılmalıdır.
    schema:
      $ref: '#/definitions/SilindiHatasi'
    examples:
      application/json:
        success: false
        message: 123 numaralı etkinlik silinmiş.
